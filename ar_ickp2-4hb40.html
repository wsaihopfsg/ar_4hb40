<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<model-viewer 
  src="ic-kp2-4HB40.glb" 
  scale="0.001 0.001 0.001"
  ar-placement="floor"
  ar 
  ar-modes="webxr scene-viewer quick-look" 
  camera-controls 
  touch-action="pan-y" 
  alt="3D model" 
  style="width: 100%; height: 500px;">
  
  <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
    👋 View in AR
  </button>
  <div slot="ar-prompt" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.8); color: white; padding: 15px 20px; border-radius: 8px; font-family: sans-serif; font-size: 14px; text-align: center; white-space: nowrap; pointer-events: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
    📱 <b>Aim at a table (45° angle)</b> <br> Place an item down & pan slowly
  </div>  

</model-viewer>
